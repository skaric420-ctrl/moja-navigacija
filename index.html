<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Nav</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: Arial;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 999;
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 10px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    #info {
      margin-top: 8px;
      font-size: 14px;
      opacity: 0.9;
    }

    .car {
      font-size: 22px;
    }
  </style>
</head>

<body>

<div id="ui">
  <input id="dest" placeholder="Destinacija" />
  <button onclick="start()">Start</button>
  <button onclick="reset()">Reset</button>
  <div id="info">Spreman</div>
</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([44.81, 20.46], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: ''
}).addTo(map);

let user;
let routeLine;
let routeCoords = [];
let car;

const carIcon = L.divIcon({
  className: "car",
  html: "🚗",
  iconSize: [30, 30]
});

// GPS
map.locate({ watch: true, setView: true });

map.on("locationfound", e => {
  user = e.latlng;

  if (!car) {
    car = L.marker(user, { icon: carIcon }).addTo(map);
  } else {
    car.setLatLng(user);
  }

  // prati auto
  if (routeCoords.length > 0) {
    map.panTo(user);
  }
});

// ROUTE
async function start() {
  const dest = document.getElementById("dest").value;
  if (!user) return;

  document.getElementById("info").innerText = "Tražim rutu...";

  const geo = await fetch(
    `https://nominatim.openstreetmap.org/search?format=json&q=${dest}`
  );
  const g = await geo.json();
  const d = g[0];

  const res = await fetch(
    `https://router.project-osrm.org/route/v1/driving/${user.lng},${user.lat};${d.lon},${d.lat}?overview=full&geometries=geojson`
  );

  const data = await res.json();
  const route = data.routes[0].geometry;

  if (routeLine) map.removeLayer(routeLine);

  routeLine = L.geoJSON(route, {
    style: { color: "white", weight: 4 }
  }).addTo(map);

  routeCoords = route.coordinates;

  document.getElementById("info").innerText = "Vozi pravo";
}

// RESET
function reset() {
  if (routeLine) map.removeLayer(routeLine);
  routeCoords = [];
  document.getElementById("info").innerText = "Resetovano";
}

</script>

</body>
</html>
