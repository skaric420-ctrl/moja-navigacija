<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">

<title>Mini Nav</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: Arial;
}

#map {
  height: 100vh;
  width: 100%;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  z-index: 999;
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 10px;
  border-radius: 10px;
}

input, button {
  padding: 10px;
  margin: 5px;
}

#info {
  margin-top: 6px;
  font-size: 14px;
  line-height: 1.4;
}

.big {
  font-size: 18px;
  font-weight: bold;
}

.warn {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="ui">
  <input id="dest" placeholder="Destinacija"/>
  <button onclick="startRoute()">Start</button>
  <button onclick="reset()">Reset</button>

  <div id="info">Spremno</div>
</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([44.81, 20.46], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: ''
}).addTo(map);

let user;
let routeLine;
let watchPath = [];
let car;

let speed = 0;
let lastPos = null;
let lastTime = null;

let speedLimit = 50;

// GPS
map.locate({watch:true, setView:true});

map.on("locationfound", e => {
  user = e.latlng;

  const now = Date.now();

  if (lastPos && lastTime) {
    speed = calcSpeed(user, lastPos, now - lastTime);
  }

  lastPos = user;
  lastTime = now;

  if (!car) {
    car = L.marker(user).addTo(map);
  } else {
    car.setLatLng(user);
  }

  map.panTo(user);

  updateUI();
});

// ROUTE
async function startRoute() {
  const dest = document.getElementById("dest").value;
  if (!user) return;

  const g = await fetch(
    `https://nominatim.openstreetmap.org/search?format=json&q=${dest}`
  );

  const data = await g.json();
  const d = data[0];

  const r = await fetch(
    `https://router.project-osrm.org/route/v1/driving/${user.lng},${user.lat};${d.lon},${d.lat}?overview=full&geometries=geojson`
  );

  const res = await r.json();
  const coords = res.routes[0].geometry.coordinates;

  watchPath = coords.map(c => ({lat:c[1], lng:c[0]}));

  if (routeLine) map.removeLayer(routeLine);

  routeLine = L.polyline(watchPath, {
    color:"white",
    weight:4
  }).addTo(map);
}

// RESET
function reset() {
  if (routeLine) map.removeLayer(routeLine);
  watchPath = [];
  document.getElementById("info").innerText = "Reset";
}

// UI
function updateUI() {
  const over = speed > speedLimit;

  document.getElementById("info").innerHTML =
    `<div class="big ${over ? "warn" : ""}">🚗 ${speed.toFixed(0)} km/h</div>` +
    `Limit: ${speedLimit} km/h`;
}

// SPEED calc
function calcSpeed(a,b,ms){
  const km = distance(a,b);
  const h = ms / 3600000;
  return km / h;
}

// DISTANCE km
function distance(a,b){
  const R = 6371;
  const dLat = (b.lat-a.lat)*Math.PI/180;
  const dLng = (b.lng-a.lng)*Math.PI/180;

  const x =
    Math.sin(dLat/2)**2 +
    Math.cos(a.lat*Math.PI/180) *
    Math.cos(b.lat*Math.PI/180) *
    Math.sin(dLng/2)**2;

  const c = 2*Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
  return R*c;
}

</script>

</body>
</html>
